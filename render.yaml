services:
  - type: web
    name: treemap
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn api_server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 300
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PYTHON_VERSION
        value: "3.11.0"
